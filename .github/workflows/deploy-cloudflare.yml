name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error title=Missing secret::Add CLOUDFLARE_API_TOKEN under Settings → Secrets and variables → Actions (use Cloudflare 'Edit Cloudflare Workers' token template)."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error title=Missing secret::Add CLOUDFLARE_ACCOUNT_ID under Settings → Secrets and variables → Actions (32-char ID from Cloudflare dashboard)."
            exit 1
          fi
          echo "Cloudflare secrets present."

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Clear stale wrangler cache
        run: rm -rf .wrangler

      - name: Deploy to Cloudflare Workers (static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc
